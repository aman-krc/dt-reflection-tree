<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Reflection</title>
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: rgba(255,255,255,0.08);
      --text: #e8e6df;
      --muted: #888;
      --accent: #c8a96e;
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
      font-size: 16px;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    #app {
      width: 100%;
      max-width: 560px;
    }

    /* Header */
    .session-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 40px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .session-time {
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    .axis-dots {
      display: flex;
      gap: 6px;
    }

    .axis-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border);
      border: 1px solid rgba(255,255,255,0.15);
      transition: background 0.4s, border-color 0.4s;
    }

    .axis-dot.active { background: var(--accent); border-color: var(--accent); }
    .axis-dot.done { background: rgba(200,169,110,0.3); border-color: rgba(200,169,110,0.4); }

    /* Main content area */
    #content {
      min-height: 320px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .node-text {
      font-size: 22px;
      font-weight: 400;
      line-height: 1.45;
      color: var(--text);
      margin-bottom: 32px;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    .node-text.visible { opacity: 1; transform: translateY(0); }

    /* Node type labels */
    .node-label {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
      opacity: 0;
      transition: opacity 0.5s ease 0.1s;
    }
    .node-label.visible { opacity: 1; }

    /* Options */
    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.4s ease 0.2s, transform 0.4s ease 0.2s;
    }

    .options.visible { opacity: 1; transform: translateY(0); }

    .option-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      cursor: pointer;
      font-size: 15px;
      line-height: 1.5;
      padding: 14px 18px;
      text-align: left;
      transition: border-color 0.2s, background 0.2s;
    }

    .option-btn:hover {
      border-color: rgba(200,169,110,0.4);
      background: rgba(200,169,110,0.06);
    }

    .option-btn:active {
      background: rgba(200,169,110,0.12);
    }

    /* Continue button */
    .continue-btn {
      background: transparent;
      border: 1px solid rgba(200,169,110,0.4);
      border-radius: var(--radius);
      color: var(--accent);
      cursor: pointer;
      font-size: 14px;
      padding: 12px 24px;
      margin-top: 24px;
      transition: border-color 0.2s, background 0.2s;
      align-self: flex-start;
    }

    .continue-btn:hover {
      border-color: var(--accent);
      background: rgba(200,169,110,0.08);
    }

    /* Reflection & bridge nodes */
    .node-reflection .node-text {
      font-size: 18px;
      color: #d4c49e;
      font-style: italic;
      line-height: 1.6;
    }

    .node-bridge .node-text {
      font-size: 16px;
      color: var(--muted);
      font-style: normal;
    }

    /* Summary */
    .summary-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      margin-top: 16px;
    }

    .summary-axis {
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .summary-axis:last-child {
      margin-bottom: 0;
      padding-bottom: 0;
      border-bottom: none;
    }

    .summary-axis-label {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .summary-axis-verdict {
      font-size: 16px;
      color: var(--text);
    }

    .summary-bar {
      display: flex;
      height: 4px;
      border-radius: 2px;
      background: var(--border);
      margin-top: 10px;
      overflow: hidden;
    }

    .summary-bar-fill {
      height: 100%;
      border-radius: 2px;
      background: var(--accent);
      transition: width 1s ease 0.5s;
    }

    .closing-note {
      margin-top: 24px;
      font-size: 15px;
      color: #c8b88a;
      line-height: 1.7;
      font-style: italic;
    }

    /* End node */
    .node-end .node-text {
      font-size: 28px;
      color: var(--muted);
      text-align: center;
    }

    /* Start node */
    .node-start .node-text {
      font-size: 20px;
    }

    /* Axis transition flash */
    .axis-transition {
      font-size: 13px;
      color: var(--accent);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 20px;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    .axis-transition.visible { opacity: 1; }
  </style>
</head>
<body>
<div id="app">
  <div class="session-header">
    <div class="session-time" id="session-time"></div>
    <div class="axis-dots">
      <div class="axis-dot" id="dot-1" title="Locus"></div>
      <div class="axis-dot" id="dot-2" title="Orientation"></div>
      <div class="axis-dot" id="dot-3" title="Radius"></div>
    </div>
  </div>
  <div id="content"></div>
</div>

<script>

const TREE_DATA = {"meta":{"version":"1.0","axes":["locus","orientation","radius"],"signals":{"axis1":["internal","external"],"axis2":["contribution","entitlement"],"axis3":["altrocentric","selfcentric"]}},"nodes":[{"id":"START","parentId":null,"type":"start","text":"Good evening. Let's take five minutes to look at your day — not to judge it, just to see it clearly.","options":null,"target":"A1_OPEN","signal":null},{"id":"A1_OPEN","parentId":"START","type":"question","text":"If today had a weather forecast, what would it be?","options":["Clear skies — things went my way","Partly cloudy — mixed bag","Stormy — things felt out of control","Fog — I felt lost or disconnected"],"target":null,"signal":null},{"id":"A1_D1","parentId":"A1_OPEN","type":"decision","text":null,"options":"answer=Clear skies — things went my way|Partly cloudy — mixed bag:A1_Q_AGENCY_HIGH;answer=Stormy — things felt out of control|Fog — I felt lost or disconnected:A1_Q_AGENCY_LOW","target":null,"signal":null},{"id":"A1_Q_AGENCY_HIGH","parentId":"A1_D1","type":"question","text":"You described today as \"{A1_OPEN.answer}\". When something went well, what was the main reason?","options":["I prepared or planned ahead","I stayed flexible and adapted","The right people showed up for me","Honestly, I got a bit lucky"],"target":null,"signal":null},{"id":"A1_Q_AGENCY_LOW","parentId":"A1_D1","type":"question","text":"You described today as \"{A1_OPEN.answer}\". When things got hard, what did you do first?","options":["Looked for what I could still control","Waited to see if things would improve","Got frustrated with the situation","Pushed through alone without asking for help"],"target":null,"signal":null},{"id":"A1_D2_HIGH","parentId":"A1_Q_AGENCY_HIGH","type":"decision","text":null,"options":"answer=I prepared or planned ahead|I stayed flexible and adapted:A1_Q_CHOICE_INT;answer=The right people showed up for me|Honestly, I got a bit lucky:A1_Q_CHOICE_EXT","target":null,"signal":null},{"id":"A1_D2_LOW","parentId":"A1_Q_AGENCY_LOW","type":"decision","text":null,"options":"answer=Looked for what I could still control:A1_Q_CHOICE_INT;answer=Waited to see if things would improve|Got frustrated with the situation|Pushed through alone without asking for help:A1_Q_CHOICE_EXT","target":null,"signal":null},{"id":"A1_Q_CHOICE_INT","parentId":null,"type":"question","text":"Think of one specific moment today that didn't go to plan. What choice did you make — even a small one?","options":["I changed my approach mid-stream","I asked someone for help","I let something go that wasn't worth fighting","I'm not sure I made a deliberate choice"],"target":null,"signal":"axis1:internal"},{"id":"A1_Q_CHOICE_EXT","parentId":null,"type":"question","text":"Think of one specific moment today that didn't go to plan. Looking back, was there anything in your control?","options":["Yes — there was something I could have done differently","Partly — some of it was on me","Not really — external factors drove it","I haven't thought about it that way"],"target":null,"signal":"axis1:external"},{"id":"A1_D3","parentId":"A1_Q_CHOICE_INT","type":"decision","text":null,"options":"answer=I changed my approach mid-stream|I asked someone for help|I let something go that wasn't worth fighting:A1_R_INT;answer=I'm not sure I made a deliberate choice:A1_R_MIXED","target":null,"signal":null},{"id":"A1_D3B","parentId":"A1_Q_CHOICE_EXT","type":"decision","text":null,"options":"answer=Yes — there was something I could have done differently|Partly — some of it was on me:A1_R_MIXED;answer=Not really — external factors drove it|I haven't thought about it that way:A1_R_EXT","target":null,"signal":null},{"id":"A1_R_INT","parentId":null,"type":"reflection","text":"You stayed in the driver's seat today — even when the road got rough. That's agency. It doesn't mean everything went your way. It means you kept choosing. Notice that.","options":null,"target":"BRIDGE_1_2","signal":"axis1:internal"},{"id":"A1_R_MIXED","parentId":null,"type":"reflection","text":"Today sits somewhere in the middle — some things you influenced, some you didn't. That's honest. The question isn't whether you controlled everything. It's whether you noticed where your choices lived.","options":null,"target":"BRIDGE_1_2","signal":"axis1:internal"},{"id":"A1_R_EXT","parentId":null,"type":"reflection","text":"Tough days pull attention outward — to what others did, to what went wrong, to what wasn't in your hands. That's real. But somewhere in there, even small, you made a call. Tomorrow, see if you can catch it while it's happening.","options":null,"target":"BRIDGE_1_2","signal":"axis1:external"},{"id":"BRIDGE_1_2","parentId":null,"type":"bridge","text":"Now let's shift from how you handled today — to what you gave.","options":null,"target":"A2_OPEN","signal":null},{"id":"A2_OPEN","parentId":"BRIDGE_1_2","type":"question","text":"Think of someone you interacted with today — a colleague, a teammate, anyone. Which of these felt most true?","options":["I gave them something — time, help, attention","It was a fair exchange — we both got something","I mostly needed something from them","I felt like I gave more than I received"],"target":null,"signal":null},{"id":"A2_D1","parentId":"A2_OPEN","type":"decision","text":null,"options":"answer=I gave them something — time, help, attention|It was a fair exchange — we both got something:A2_Q_CONTRIB;answer=I mostly needed something from them|I felt like I gave more than I received:A2_Q_ENTITLE","target":null,"signal":null},{"id":"A2_Q_CONTRIB","parentId":"A2_D1","type":"question","text":"What's one thing you did today that no one asked you to do?","options":["Helped someone who was stuck","Shared information that would have been useful to keep to myself","Did something unglamorous that needed doing","I can't think of anything like that today"],"target":null,"signal":"axis2:contribution"},{"id":"A2_Q_ENTITLE","parentId":"A2_D1","type":"question","text":"When you think about recognition today — credit for work done, appreciation from others — how did it feel?","options":["I didn't think much about it","I felt my work was fairly seen","I felt my contribution wasn't noticed","I felt others got credit that should have been shared"],"target":null,"signal":"axis2:entitlement"},{"id":"A2_D2_C","parentId":"A2_Q_CONTRIB","type":"decision","text":null,"options":"answer=Helped someone who was stuck|Shared information that would have been useful to keep to myself|Did something unglamorous that needed doing:A2_R_CONTRIB;answer=I can't think of anything like that today:A2_R_MIXED","target":null,"signal":null},{"id":"A2_D2_E","parentId":"A2_Q_ENTITLE","type":"decision","text":null,"options":"answer=I didn't think much about it|I felt my work was fairly seen:A2_R_MIXED;answer=I felt my contribution wasn't noticed|I felt others got credit that should have been shared:A2_R_ENTITLE","target":null,"signal":null},{"id":"A2_Q_EXTRA","parentId":null,"type":"question","text":"One more: if you could replay today, what would feel most satisfying?","options":["Having delivered something excellent","Having helped someone effectively","Having been recognized for what I did","Having avoided the friction I experienced"],"target":null,"signal":null},{"id":"A2_D3","parentId":"A2_Q_EXTRA","type":"decision","text":null,"options":"answer=Having delivered something excellent|Having helped someone effectively:A2_R_CONTRIB;answer=Having been recognized for what I did|Having avoided the friction I experienced:A2_R_ENTITLE","target":null,"signal":null},{"id":"A2_R_CONTRIB","parentId":null,"type":"reflection","text":"You were giving today. That's not small. The work that gets done without anyone asking for it — the help that shows up before someone has to ask — that's what holds teams together. You did some of that.","options":null,"target":"BRIDGE_2_3","signal":"axis2:contribution"},{"id":"A2_R_MIXED","parentId":null,"type":"reflection","text":"Today was balanced — not every day needs to be about pure giving. But notice the moments when you had a choice: help or hold back, share or protect. What did you choose, even once?","options":null,"target":"BRIDGE_2_3","signal":"axis2:contribution"},{"id":"A2_R_ENTITLE","parentId":null,"type":"reflection","text":"When we focus on what we deserve — recognition, fairness, credit — it's usually because something real feels unacknowledged. That matters. And: the question worth sitting with is whether your energy today was mostly pointed outward or inward.","options":null,"target":"BRIDGE_2_3","signal":"axis2:entitlement"},{"id":"BRIDGE_2_3","parentId":null,"type":"bridge","text":"Last shift. From what you gave — to who you were thinking about when you gave it.","options":null,"target":"A3_OPEN","signal":null},{"id":"A3_OPEN","parentId":"BRIDGE_2_3","type":"question","text":"When you think about today's biggest challenge, whose experience comes to mind first?","options":["Mine — it was my problem to navigate","My team's — we were all in it together","A specific person who had it harder than me","The customer or end user who depends on our work"],"target":null,"signal":null},{"id":"A3_D1","parentId":"A3_OPEN","type":"decision","text":null,"options":"answer=Mine — it was my problem to navigate:A3_Q_SELF;answer=My team's — we were all in it together|A specific person who had it harder than me|The customer or end user who depends on our work:A3_Q_ALTO","target":null,"signal":null},{"id":"A3_Q_SELF","parentId":"A3_D1","type":"question","text":"That makes sense — your own experience is real and immediate. At any point today, did you catch yourself wondering how someone else was doing?","options":["Yes — I checked in on someone","Yes — I noticed but didn't act on it","Not really — I was in survival mode","I'm not sure"],"target":null,"signal":"axis3:selfcentric"},{"id":"A3_Q_ALTO","parentId":"A3_D1","type":"question","text":"You thought about others in that challenge. Did that shift how you approached it?","options":["Yes — it made me more patient or careful","Yes — it helped me prioritize differently","I noticed them but stayed focused on my own part","I'm not sure it changed my approach"],"target":null,"signal":"axis3:altrocentric"},{"id":"A3_D2_S","parentId":"A3_Q_SELF","type":"decision","text":null,"options":"answer=Yes — I checked in on someone:A3_Q_MEANING;answer=Yes — I noticed but didn't act on it|Not really — I was in survival mode|I'm not sure:A3_R_SELF","target":null,"signal":null},{"id":"A3_D2_A","parentId":"A3_Q_ALTO","type":"decision","text":null,"options":"answer=Yes — it made me more patient or careful|Yes — it helped me prioritize differently:A3_Q_MEANING;answer=I noticed them but stayed focused on my own part|I'm not sure it changed my approach:A3_R_ALTO_MILD","target":null,"signal":null},{"id":"A3_Q_MEANING","parentId":null,"type":"question","text":"When you think about the work you did today — the effort, the stress, even the frustration — does it feel like it was in service of something beyond yourself?","options":["Yes, clearly — I can see who it helps","Somewhat — I believe in the work even when it's hard","Not today — it felt disconnected from purpose","I haven't thought about it that way"],"target":null,"signal":null},{"id":"A3_D3","parentId":"A3_Q_MEANING","type":"decision","text":null,"options":"answer=Yes, clearly — I can see who it helps|Somewhat — I believe in the work even when it's hard:A3_R_ALTO;answer=Not today — it felt disconnected from purpose|I haven't thought about it that way:A3_R_SELF","target":null,"signal":null},{"id":"A3_R_ALTO","parentId":null,"type":"reflection","text":"You're carrying others with you — not as a burden, but as a compass. That's what makes hard days tolerable: knowing they're not just about you. The meaning lives in the gap between you and the person your work reaches.","options":null,"target":"SUMMARY","signal":"axis3:altrocentric"},{"id":"A3_R_ALTO_MILD","parentId":null,"type":"reflection","text":"You saw others today. That's already something. Awareness before action is how this grows — noticing the person in the room who needs something, even when you don't act on it, is the first step toward widening how you show up.","options":null,"target":"SUMMARY","signal":"axis3:altrocentric"},{"id":"A3_R_SELF","parentId":null,"type":"reflection","text":"Today was about getting through. That's valid — some days require all of your attention just to survive them. Tomorrow, try to find one moment where you look up and notice someone else in the room. Not to help them. Just to see them.","options":null,"target":"SUMMARY","signal":"axis3:selfcentric"},{"id":"SUMMARY","parentId":null,"type":"summary","text":"Today: {axis1.summary}. {axis2.summary}. {axis3.summary}.\n\n{closing_reflection}","options":null,"target":"END","signal":null,"summaryTemplates":{"axis1":{"internal":"You owned your choices","external":"You felt pulled by circumstances","mixed":"You navigated between control and chaos"},"axis2":{"contribution":"You gave more than you counted","entitlement":"You were paying attention to what you received","mixed":"You balanced giving and receiving"},"axis3":{"altrocentric":"You thought beyond yourself","selfcentric":"You were focused on your own lane","mixed":"You moved between self and others"},"closingReflections":{"internal+contribution+altrocentric":"That's a day worth building on. Agency, generosity, and perspective — when all three line up, the work means something.","internal+contribution+selfcentric":"You were capable and giving today. Tomorrow, see if you can look up from the work long enough to notice who it reaches.","internal+entitlement+altrocentric":"You navigated today with skill, and you were looking out for others. The middle piece — moving from receiving to giving — is where the next growth lives.","internal+entitlement+selfcentric":"You had more control today than you may have felt. The work ahead is pointing that agency outward — toward the team, toward what others // ─── Engine ─────────────────────────────────────────────────────────────────
const state = {
  answers: {},       // nodeId -> selected answer text
  signals: {
    axis1: { internal: 0, external: 0 },
    axis2: { contribution: 0, entitlement: 0 },
    axis3: { altrocentric: 0, selfcentric: 0 }
  },
  currentAxis: 1,
  path: []
};

const nodeMap = {};
TREE_DATA.nodes.forEach(n => nodeMap[n.id] = n);

function getDominant(axisObj) {
  const entries = Object.entries(axisObj);
  const max = Math.max(...entries.map(e => e[1]));
  const winners = entries.filter(e => e[1] === max);
  return winners.length === 1 ? winners[0][0] : 'mixed';
}

function interpolate(text) {
  return text.replace(/\{([^}]+)\}/g, (_, key) => {
    const parts = key.split('.');
    if (parts[1] === 'answer') return state.answers[parts[0]] || '';
    return '';
  });
}

function parseDecisionOptions(optStr) {
  // "answer=A|B:NodeX;answer=C:NodeY"
  const rules = optStr.split(';');
  return rules.map(r => {
    const [condition, target] = r.split(':');
    const values = condition.replace('answer=', '').split('|');
    return { values, target };
  });
}

function resolveDecision(node) {
  const rules = parseDecisionOptions(node.options);
  // Find the previous question's answer
  const prevId = state.path[state.path.length - 2];
  const answer = state.answers[prevId];
  for (const rule of rules) {
    if (rule.values.includes(answer)) return rule.target;
  }
  return rules[0].target; // fallback
}

function getChildDecision(parentId) {
  return TREE_DATA.nodes.find(n => n.parentId === parentId && n.type === 'decision');
}

function getChildNode(parentId, excludeDecision = true) {
  if (excludeDecision) {
    return TREE_DATA.nodes.find(n => n.parentId === parentId && n.type !== 'decision');
  }
  return TREE_DATA.nodes.find(n => n.parentId === parentId);
}

function nextNodeId(currentNode, answer) {
  // 1. If explicit target, use it
  if (currentNode.target) return currentNode.target;

  // 2. If there's a child decision node, route through it
  const decision = getChildDecision(currentNode.id);
  if (decision) {
    // Use answer if provided
    if (answer !== undefined) state.answers[currentNode.id] = answer;
    // Temporarily push decision to path to resolve
    state.path.push(decision.id);
    const resolved = resolveDecision(decision);
    state.path.pop();
    return resolved;
  }

  // 3. Otherwise, find first non-decision child
  const child = getChildNode(currentNode.id);
  if (child) return child.id;

  return null;
}

function applySignal(signal) {
  if (!signal) return;
  const [axis, pole] = signal.split(':');
  if (state.signals[axis] && state.signals[axis][pole] !== undefined) {
    state.signals[axis][pole]++;
  }
}

function buildSummary(node) {
  const t = node.summaryTemplates;
  const a1 = getDominant(state.signals.axis1);
  const a2 = getDominant(state.signals.axis2);
  const a3 = getDominant(state.signals.axis3);

  const s1 = t.axis1[a1] || t.axis1.mixed;
  const s2 = t.axis2[a2] || t.axis2.mixed;
  const s3 = t.axis3[a3] || t.axis3.mixed;
  const key = `${a1}+${a2}+${a3}`;
  const closing = t.closingReflections[key] || t.closingReflections['external+entitlement+selfcentric'];

  return { s1, s2, s3, closing, a1, a2, a3 };
}

// ─── UI ─────────────────────────────────────────────────────────────────────
function updateTime() {
  const now = new Date();
  const h = now.getHours().toString().padStart(2, '0');
  const m = now.getMinutes().toString().padStart(2, '0');
  document.getElementById('session-time').textContent = `${h}:${m}`;
}

function updateDots() {
  for (let i = 1; i <= 3; i++) {
    const dot = document.getElementById(`dot-${i}`);
    dot.className = 'axis-dot';
    if (i < state.currentAxis) dot.classList.add('done');
    else if (i === state.currentAxis) dot.classList.add('active');
  }
}

function getAxisFromNodeId(id) {
  if (!id) return 1;
  if (id.startsWith('A3') || id === 'BRIDGE_2_3') return 3;
  if (id.startsWith('A2') || id === 'BRIDGE_1_2') return 2;
  if (id.startsWith('SUMMARY') || id === 'END') return 3;
  return 1;
}

function renderNode(nodeId) {
  const node = nodeMap[nodeId];
  if (!node) return;

  state.path.push(nodeId);
  applySignal(node.signal);
  state.currentAxis = getAxisFromNodeId(nodeId);
  updateDots();

  const content = document.getElementById('content');
  content.className = `node-${node.type}`;
  content.innerHTML = '';

  // Auto-advance types
  if (node.type === 'decision') {
    const next = resolveDecision(node);
    setTimeout(() => renderNode(next), 100);
    return;
  }

  if (node.type === 'start') {
    renderStart(node, content);
  } else if (node.type === 'question') {
    renderQuestion(node, content);
  } else if (node.type === 'reflection') {
    renderReflection(node, content);
  } else if (node.type === 'bridge') {
    renderBridge(node, content);
  } else if (node.type === 'summary') {
    renderSummary(node, content);
  } else if (node.type === 'end') {
    renderEnd(node, content);
  }
}

function animateIn(el) {
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      el.querySelectorAll('.node-label, .node-text, .options').forEach(e => {
        e.classList.add('visible');
      });
    });
  });
}

function renderStart(node, container) {
  const label = el('div', 'node-label', 'Evening reflection');
  const text = el('div', 'node-text', node.text);
  const btn = document.createElement('button');
  btn.className = 'continue-btn';
  btn.textContent = 'Begin →';
  btn.onclick = () => {
    const next = nextNodeId(node);
    renderNode(next);
  };
  container.append(label, text, btn);
  animateIn(container);
}

function renderQuestion(node, container) {
  const axisLabels = { 1: 'Axis I — Locus', 2: 'Axis II — Orientation', 3: 'Axis III — Radius' };
  const label = el('div', 'node-label', axisLabels[state.currentAxis] || '');
  const text = el('div', 'node-text', interpolate(node.text));
  const opts = document.createElement('div');
  opts.className = 'options';

  node.options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = opt;
    btn.onclick = () => {
      state.answers[node.id] = opt;
      const next = nextNodeId(node, opt);
      if (next) renderNode(next);
    };
    opts.appendChild(btn);
  });

  container.append(label, text, opts);
  animateIn(container);
}

function renderReflection(node, container) {
  const label = el('div', 'node-label', 'Reflection');
  const text = el('div', 'node-text', node.text);
  const btn = document.createElement('button');
  btn.className = 'continue-btn';
  btn.textContent = 'Continue →';
  btn.onclick = () => renderNode(node.target);
  container.append(label, text, btn);
  animateIn(container);
}

function renderBridge(node, container) {
  const text = el('div', 'node-text', node.text);
  container.append(text);
  animateIn(container);
  setTimeout(() => renderNode(node.target), 1800);
}

function renderSummary(node, container) {
  const { s1, s2, s3, closing, a1, a2, a3 } = buildSummary(node);

  const label = el('div', 'node-label', 'Today\'s reflection');
  const heading = el('div', 'node-text', 'Here\'s what today looked like.');

  const card = document.createElement('div');
  card.className = 'summary-card';

  const axisData = [
    { label: 'Axis I · Locus', verdict: s1, signals: state.signals.axis1, poles: ['internal', 'external'] },
    { label: 'Axis II · Orientation', verdict: s2, signals: state.signals.axis2, poles: ['contribution', 'entitlement'] },
    { label: 'Axis III · Radius', verdict: s3, signals: state.signals.axis3, poles: ['altrocentric', 'selfcentric'] }
  ];

  axisData.forEach(({ label, verdict, signals, poles }) => {
    const axDiv = document.createElement('div');
    axDiv.className = 'summary-axis';
    const lbl = el('div', 'summary-axis-label', label);
    const vrd = el('div', 'summary-axis-verdict', verdict);

    const total = poles.reduce((s, p) => s + (signals[p] || 0), 0) || 1;
    const pct = Math.round(((signals[poles[0]] || 0) / total) * 100);

    const bar = document.createElement('div');
    bar.className = 'summary-bar';
    const fill = document.createElement('div');
    fill.className = 'summary-bar-fill';
    fill.style.width = '0%';
    bar.appendChild(fill);
    setTimeout(() => { fill.style.width = pct + '%'; }, 200);

    axDiv.append(lbl, vrd, bar);
    card.appendChild(axDiv);
  });

  const note = el('div', 'closing-note', closing);
  container.append(label, heading, card, note);

  const btn = document.createElement('button');
  btn.className = 'continue-btn';
  btn.textContent = 'Close →';
  btn.style.marginTop = '24px';
  btn.onclick = () => renderNode(node.target);
  container.appendChild(btn);

  animateIn(container);
}

function renderEnd(node, container) {
  const text = el('div', 'node-text', node.text);
  container.append(text);
  animateIn(container);
  updateDots();
}

function el(tag, cls, txt) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (txt) e.textContent = txt;
  return e;
}

// ─── Boot ───────────────────────────────────────────────────────────────────
updateTime();
setInterval(updateTime, 30000);
updateDots();
renderNode('START');
</script>
</body>
</html>
